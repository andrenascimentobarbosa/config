bind-key r source-file ~/.tmux.conf

set -g renumber-windows on
set -g base-index 1
set -g pane-base-index 1

set-option -sg escape-time 0
set-option -g mode-keys vi
set-option -g status-interval 1

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

set-option -g status-position bottom
set-option -g status-justify left
set-option -g status-left ""
set-option -g status-style "bg=colour233"
set-option -g window-status-style "bg=colour235"
set-option -g window-status-current-style "bg=colour238"
set-option -g window-status-format "#[fg=colour7]#I #[fg=colour15]#W #[fg=colour196]#F"
set-option -g window-status-current-format "#[fg=colour51] #I #[fg=colour255]#W #[fg=colour46]#F "
set-option -g status-right "#[bg=colour236] %H:%M #[bg=colour238] %a #[bg=colour240] %d/%m/%Y "

